name: Update repo bubbles data

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate repos.json
        run: node scripts/update-repos.mjs
        env:
          GITHUB_USERNAME: Enferlain
          MAX_REPOS: 5
          MAX_AGE_DAYS: 30
          INCLUDE_FORKS: "true"
          INCLUDE_ARCHIVED: "false"
          EXCLUDED_REPOS: repo-data
          CANDIDATE_LIMIT: 15
          BRANCH_LIMIT: 20
          # Optional: add a read-only public token as a repo secret if unauthenticated API rate limits bite.
          # GITHUB_PUBLIC_TOKEN: ${{ secrets.GITHUB_PUBLIC_TOKEN }}

      - name: Commit repos.json
        run: |
          if git diff --quiet repos.json; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add repos.json
          git commit -m "Update repo bubbles data"
          git push
